<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron Micheal Burt | Admin Inbox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=initTurnstile" async defer></script>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <div id="authOverlay" class="auth-overlay">
        <div class="auth-card">
            <div class="auth-icon">
                <i data-lucide="lock"></i>
            </div>
            <h1 class="auth-title">Admin Dashboard</h1>
            <p class="auth-subtitle">Verify credentials to access messages.</p>
            <form id="authForm" autocomplete="off">
                <div class="form-group">
                    <i data-lucide="user" class="input-icon"></i>
                    <input type="text" id="usernameInput" required placeholder="Username" autocomplete="off">
                </div>
                <div class="form-group">
                    <i data-lucide="key-round" class="input-icon"></i>
                    <input type="password" id="passwordInput" required placeholder="Password" autocomplete="off">
                </div>
                <div class="form-group turnstile-container" style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                    <div id="turnstileWidgetContainer"></div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span>Authenticate</span>
                    <i data-lucide="shield-check"></i>
                </button>
            </form>
            <div id="authError" class="error-message"></div>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar" id="sidebarNode">
            <div class="sidebar-header">
                <h2 class="sidebar-title">
                    <i data-lucide="inbox"></i>
                    <span>Messages</span>
                </h2>
                <div style="display: flex; align-items: center;">
                    <button id="settingsToggleBtn" class="btn-logout" title="Settings & Administrators" style="margin-right: 0.75rem;">
                        <i data-lucide="settings"></i>
                    </button>
                    <button id="logoutBtn" class="btn-logout" title="Log Out">
                        <i data-lucide="log-out"></i>
                    </button>
                </div>
            </div>
            <div class="message-list" id="messageListContainer"></div>
        </aside>

        <main class="main-pane">
            <div class="empty-state" id="emptyStateContainer">
                <i data-lucide="mail-open" class="empty-icon"></i>
                <p>Select a message to read</p>
            </div>
            <div class="detail-pane" id="detailPaneContainer" style="display: none;">
                <div class="detail-header">
                    <div class="detail-meta-group">
                        <button class="back-btn-mobile" id="mobileBackBtn">
                            <i data-lucide="arrow-left"></i>
                            <span>Inbox</span>
                        </button>
                        <h2 class="detail-title" id="detailSenderName"></h2>
                        <div class="detail-sender-row">
                            <span class="detail-sender-label">From:</span>
                            <a href="" class="detail-sender-email" id="detailSenderEmail"></a>
                        </div>
                        <span class="detail-time" id="detailSentTime"></span>
                    </div>
                    <button class="btn-delete" id="deleteBtn">
                        <i data-lucide="trash-2"></i>
                        <span>Delete</span>
                    </button>
                </div>
                <div class="detail-body" id="detailBody"></div>
            </div>

            <div class="detail-pane" id="settingsPaneContainer" style="display: none;">
                <div class="detail-header">
                    <div class="detail-meta-group">
                        <button class="back-btn-mobile" id="settingsBackBtn">
                            <i data-lucide="arrow-left"></i>
                            <span>Inbox</span>
                        </button>
                        <h2 class="detail-title">System Settings</h2>
                        <span class="detail-time">Manage administrator accounts and security credentials</span>
                    </div>
                </div>
                <div class="detail-body" style="background: var(--pane-body-bg); padding: 2.5rem; overflow-y: auto;">
                    <div class="settings-section">
                        <h3 class="settings-title">
                            <i data-lucide="key-round" style="color: var(--primary);"></i>
                            <span>Change Your Password</span>
                        </h3>
                        <form id="changePasswordForm" autocomplete="off">
                            <div class="settings-form-row">
                                <div class="settings-input-group">
                                    <label for="changePasswordInput">New Password</label>
                                    <input type="password" id="changePasswordInput" required placeholder="Min 6 characters" autocomplete="off">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: auto; padding: 0.85rem 1.5rem; border-radius: 12px; margin-top: 0.5rem;">
                                <span>Update Password</span>
                            </button>
                        </form>
                        <div id="changePasswordStatus" style="margin-top: 1rem; font-size: 0.9rem; font-weight: 500;"></div>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-title">
                            <i data-lucide="users" style="color: var(--primary);"></i>
                            <span>System Administrators</span>
                        </h3>
                        <div id="superusersListContainer"></div>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-title">
                            <i data-lucide="user-plus" style="color: var(--primary);"></i>
                            <span>Create New Administrator</span>
                        </h3>
                        <form id="createAdminForm" autocomplete="off">
                            <div class="settings-form-row">
                                <div class="settings-input-group">
                                    <label for="newAdminUsername">Username</label>
                                    <input type="text" id="newAdminUsername" required placeholder="Username" autocomplete="off">
                                </div>
                                <div class="settings-input-group">
                                    <label for="newAdminPassword">Password</label>
                                    <input type="password" id="newAdminPassword" required placeholder="Min 6 characters" autocomplete="off">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: auto; padding: 0.85rem 1.5rem; border-radius: 12px; margin-top: 0.5rem;">
                                <span>Create Administrator</span>
                            </button>
                        </form>
                        <div id="createAdminStatus" style="margin-top: 1rem; font-size: 0.9rem; font-weight: 500;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
