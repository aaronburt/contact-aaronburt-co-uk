<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaron Micheal Burt | Contact</title>
    <meta name="description"
        content="Official contact details for Aaron Micheal Burt. Software developer specializing in full-stack development.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=initTurnstile" async defer></script>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-container">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="page-container">
        <div class="contact-card">
            <div class="card-sidebar">
                <header class="profile-section">
                    <div class="avatar-container">
                        <div class="avatar-glow"></div>
                        <div class="avatar-inner">
                            <img src="assets/aaronburt-Dd7jp6dI.jpg" alt="Aaron Micheal Burt" class="avatar-img">
                        </div>
                        <span class="status-indicator"></span>
                    </div>
                    <h1 class="profile-name">Aaron Micheal Burt</h1>
                    <p class="profile-title">Software Developer</p>
                    <p class="profile-bio">Passionate software developer driven by curiosity for technology,
                        specializing in full-stack development and home automation.</p>
                </header>

                <section class="cta-actions">
                    <button id="downloadVcardBtn" class="btn btn-primary">
                        <i data-lucide="user-plus"></i>
                        <span>Save Contact Details</span>
                    </button>
                    <!--sse-->
                    <div class="quick-links">
                        <a href="mailto:contact@aaronburt.co.uk" class="quick-btn btn-email" title="Email Aaron">
                            <i data-lucide="mail"></i>
                        </a>
                        <a href="https://github.com/aaronburt" target="_blank" rel="noopener noreferrer"
                            class="quick-btn btn-github" title="GitHub Profile">
                            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round" class="brand-svg">
                                <path
                                    d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4">
                                </path>
                                <path d="M9 18c-4.51 2-5-2-7-2"></path>
                            </svg>
                        </a>
                        <a href="https://www.instagram.com/aaronmichaelburt/" target="_blank" rel="noopener noreferrer"
                            class="quick-btn btn-instagram" title="Instagram Profile">
                            <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round" class="brand-svg">
                                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                            </svg>
                        </a>
                    </div>
                    <!--/sse-->
                </section>

            </div>

            <div class="card-main">
                <section class="form-section">
                    <h2 class="section-title">Send a Direct Message</h2>
                    <form id="contactForm" class="contact-form" autocomplete="off">
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="nameInput" required placeholder=" " autocomplete="off">
                                <label for="nameInput">Your Name</label>
                            </div>
                            <div class="form-group">
                                <input type="email" id="emailInput" required placeholder=" " autocomplete="off">
                                <label for="emailInput">Your Email</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <textarea id="messageInput" required placeholder=" " rows="4" autocomplete="off"></textarea>
                            <label for="messageInput">Your Message</label>
                        </div>
                        <div class="form-group turnstile-container">
                            <div id="turnstileWidgetContainer"></div>
                        </div>
                        <button type="submit" class="btn btn-secondary">
                            <span>Send Message</span>
                            <i data-lucide="send"></i>
                        </button>
                    </form>
                    <div id="formFeedback" class="form-feedback hidden"></div>
                </section>
            </div>
        </div>
    </main>
    <div class="privacy-badge">
        <div class="privacy-badge-icon">
            <i data-lucide="shield-check"></i>
        </div>
        <div class="privacy-badge-content">
            Protected by Cloudflare Turnstile<br>
            <a href="https://www.cloudflare.com/en-gb/turnstile-privacy-policy/" target="_blank"
                rel="noopener noreferrer">Privacy Policy</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
